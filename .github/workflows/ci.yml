name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  godot:
    name: Godot checks
    runs-on: ubuntu-latest

    env:
      GODOT_VERSION: "4.7.1"
      GODOT_RELEASE: "stable"
      GODOT_BINARY: Godot_v4.7.1-stable_linux.x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Godot
        run: |
          curl --fail --location --output godot.zip \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_RELEASE}/${GODOT_BINARY}.zip"
          unzip -q godot.zip -d godot
          chmod +x "godot/${GODOT_BINARY}"
          echo "$PWD/godot" >> "$GITHUB_PATH"

      - name: Import project resources
        run: |
          "${GODOT_BINARY}" --headless --path . --import

      - name: Install GDScript lint tools
        run: |
          python -m pip install "gdtoolkit==4.*"

      - name: Lint GDScript
        run: |
          gdlint .

      - name: Check GDScript syntax
        run: |
          set -euo pipefail
          for script in scripts/*.gd tests/*.gd; do
            echo "::group::${script}"
            "${GODOT_BINARY}" --headless --path . --check-only --script "${script}"
            echo "::endgroup::"
          done

      - name: Run unit tests
        run: |
          "${GODOT_BINARY}" --headless --path . --script tests/run_tests.gd

      - name: Smoke load project
        run: |
          "${GODOT_BINARY}" --headless --path . --quit-after 1

  windows-build:
    name: Windows build
    runs-on: ubuntu-latest
    needs: godot

    env:
      GODOT_VERSION: "4.7.1"
      GODOT_RELEASE: "stable"
      GODOT_BINARY: Godot_v4.7.1-stable_linux.x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Cache Godot editor and export templates
        id: godot-cache
        uses: actions/cache@v4
        with:
          path: |
            godot
            export_templates.tpz
          key: godot-${{ env.GODOT_VERSION }}-${{ env.GODOT_RELEASE }}-linux

      - name: Install Godot
        if: steps.godot-cache.outputs.cache-hit != 'true'
        run: |
          curl --fail --location --output godot.zip \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_RELEASE}/${GODOT_BINARY}.zip"
          unzip -q godot.zip -d godot

      - name: Download export templates
        if: steps.godot-cache.outputs.cache-hit != 'true'
        run: |
          curl --fail --location --output export_templates.tpz \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_RELEASE}/Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_export_templates.tpz"

      - name: Add Godot to PATH
        run: |
          chmod +x "godot/${GODOT_BINARY}"
          echo "$PWD/godot" >> "$GITHUB_PATH"

      - name: Install export templates
        run: |
          template_dir="$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_RELEASE}"
          mkdir -p "${template_dir}"
          unzip -q export_templates.tpz -d /tmp/godot_templates
          cp -r /tmp/godot_templates/templates/. "${template_dir}/"

      - name: Import project resources
        run: |
          "${GODOT_BINARY}" --headless --path . --import

      - name: Export Windows build
        run: |
          mkdir -p build/windows
          "${GODOT_BINARY}" --headless --path . --export-release "Windows Desktop" build/windows/super-miranda-3d.exe

      - name: Verify build output
        run: |
          test -f build/windows/super-miranda-3d.exe

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: build/windows/
          retention-days: 14
